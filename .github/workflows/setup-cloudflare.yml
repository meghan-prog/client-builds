name: Setup Cloudflare Pages & DNS

on:
  push:
    branches: [main]
    paths: ['.github/workflows/setup-cloudflare.yml']

jobs:
  setup:
    runs-on: ubuntu-latest
    env:
      CF_TOKEN: cfut_hxszV2bmi4AIdHoTn5OnIy4e3RWpLAFKvSIdjcMD7a2e2a8c
      CF_ACCOUNT: 179e5d05b1da4981ace975cd617faf40
      CF_ZONE: 8745d8b0ae278f5a31a0abca1ce2fc61

    steps:
      - name: Create corporetta-scan
        run: |
          echo "--- Creating corporetta-scan ---"
          curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/pages/projects" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"name":"corporetta-scan","production_branch":"main","source":{"type":"github","config":{"owner":"meghan-prog","repo_name":"client-builds","production_branch":"main","pr_comments_enabled":true,"deployments_enabled":true}},"build_config":{"build_command":"","destination_dir":"","root_dir":"corporetta/scan"}}'

      - name: Create corporetta-website
        run: |
          echo "--- Creating corporetta-website ---"
          curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/pages/projects" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"name":"corporetta-website","production_branch":"main","source":{"type":"github","config":{"owner":"meghan-prog","repo_name":"client-builds","production_branch":"main","pr_comments_enabled":true,"deployments_enabled":true}},"build_config":{"build_command":"","destination_dir":"","root_dir":"corporetta/website"}}'

      - name: Create corporetta-voorstel
        run: |
          echo "--- Creating corporetta-voorstel ---"
          curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/pages/projects" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"name":"corporetta-voorstel","production_branch":"main","source":{"type":"github","config":{"owner":"meghan-prog","repo_name":"client-builds","production_branch":"main","pr_comments_enabled":true,"deployments_enabled":true}},"build_config":{"build_command":"","destination_dir":"","root_dir":"corporetta/voorstel"}}'

      - name: Add custom domains to Pages projects
        run: |
          sleep 10  # wait for projects to initialise
          echo "--- Adding custom domain to corporetta-scan ---"
          curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/pages/projects/corporetta-scan/domains" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"name":"scan.winst.ai"}'
          echo "--- Adding custom domain to corporetta-website ---"
          curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/pages/projects/corporetta-website/domains" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"name":"corporetta.winst.ai"}'
          echo "--- Adding custom domain to corporetta-voorstel ---"
          curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/pages/projects/corporetta-voorstel/domains" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"name":"voorstel.winst.ai"}'

      - name: Create DNS CNAME records
        run: |
          echo "--- scan.winst.ai -> corporetta-scan.pages.dev ---"
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$CF_ZONE/dns_records" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"type":"CNAME","name":"scan","content":"corporetta-scan.pages.dev","ttl":1,"proxied":true}'
          echo "--- corporetta.winst.ai -> corporetta-website.pages.dev ---"
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$CF_ZONE/dns_records" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"type":"CNAME","name":"corporetta","content":"corporetta-website.pages.dev","ttl":1,"proxied":true}'
          echo "--- voorstel.winst.ai -> corporetta-voorstel.pages.dev ---"
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$CF_ZONE/dns_records" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"type":"CNAME","name":"voorstel","content":"corporetta-voorstel.pages.dev","ttl":1,"proxied":true}'

      - name: Print live URLs
        run: |
          echo ""
          echo "=========================================="
          echo "  ALL DONE - LIVE URLS"
          echo "=========================================="
          echo "  https://scan.winst.ai"
          echo "  https://corporetta.winst.ai"
          echo "  https://voorstel.winst.ai"
          echo "=========================================="
          echo ""
          echo "Pages.dev direct URLs:"
          echo "  https://corporetta-scan.pages.dev"
          echo "  https://corporetta-website.pages.dev"
          echo "  https://corporetta-voorstel.pages.dev"
